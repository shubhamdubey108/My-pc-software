<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Institute Manager</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <section id="loginPage" class="page">
      <div class="panel login-panel">
        <h1>Institute Manager</h1>
        <p>Computer Institute Fees & Student Management</p>
        <form id="loginForm" class="stack">
          <input id="username" type="text" placeholder="Admin username" required />
          <input id="password" type="password" placeholder="Password" required />
          <button type="submit" class="btn primary">Login</button>
        </form>
        <small>Default: <b>admin / admin123</b></small>
      </div>
    </section>

    <section id="mainPage" class="page hidden">
      <header class="topbar">
        <div>
          <h2 id="instituteTitle">My Institute</h2>
          <p id="todayLine"></p>
        </div>
        <div class="row">
          <button id="darkToggle" class="btn">Dark Mode</button>
          <button id="logoutBtn" class="btn danger">Logout</button>
        </div>
      </header>

      <nav class="tabs" id="tabs"></nav>

      <main id="views">
        <section id="view-dashboard" class="view"></section>
        <section id="view-students" class="view hidden"></section>
        <section id="view-fees" class="view hidden"></section>
        <section id="view-attendance" class="view hidden"></section>
        <section id="view-batches" class="view hidden"></section>
        <section id="view-courses" class="view hidden"></section>
        <section id="view-reports" class="view hidden"></section>
        <section id="view-certificates" class="view hidden"></section>
        <section id="view-settings" class="view hidden"></section>
      </main>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
