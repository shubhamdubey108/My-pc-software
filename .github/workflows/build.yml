name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install
      - run: npx electron-builder --win --publish never

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: mysoftware
          path: dist/*.exe
